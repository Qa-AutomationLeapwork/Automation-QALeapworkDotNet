name: Leapwork Action

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 3'
      timezone: 'Asia/Kolkata'

jobs:
  build:
  
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Run Leapwork Automated Test flows for multiple schedules
        shell: pwsh 
        run: |
          $ErrorActionPreference = 'Stop'

          function Normalize-UrlQuerySeparators([string]$InputValue) {
            if ([string]::IsNullOrWhiteSpace($InputValue)) {
              return $InputValue
            }

            $firstQuestionMarkIndex = $InputValue.IndexOf('?')
            if ($firstQuestionMarkIndex -lt 0) {
              return $InputValue
            }

            $pathPart = $InputValue.Substring(0, $firstQuestionMarkIndex + 1)
            $queryPart = $InputValue.Substring($firstQuestionMarkIndex + 1).Replace('?', '&')
            return $pathPart + $queryPart
          }

          function Get-ControllerBaseUrl([string]$HostnameOrUrl) {
            $trimmedInput = Normalize-UrlQuerySeparators(($HostnameOrUrl ?? '').Trim())

            if ($trimmedInput.StartsWith('http://') -or $trimmedInput.StartsWith('https://')) {
              $candidate = $trimmedInput
            }
            elseif ($trimmedInput.Contains('/') -or $trimmedInput.Contains('?')) {
              $candidate = "https://$trimmedInput"
            }
            else {
              $candidate = "https://$trimmedInput"
            }

            $uri = $null
            if (-not [System.Uri]::TryCreate($candidate, [System.UriKind]::Absolute, [ref]$uri) -or `
                [string]::IsNullOrWhiteSpace($uri.Host)) {
              throw 'Invalid controller URL'
            }

            $builder = [System.UriBuilder]::new($uri)

            if (-not $builder.Port -or $builder.Port -eq -1) {
              if ($builder.Scheme -eq 'https') {
                $builder.Port = 443
              }
              else {
                $builder.Port = 80
              }
            }

            if ([string]::IsNullOrWhiteSpace($builder.Path)) {
              $builder.Path = '/'
            }

            return $builder
          }

          function Build-ControllerApiUrl([System.UriBuilder]$BaseUrlBuilder, [string]$RelativePath) {
            $builder = [System.UriBuilder]::new($BaseUrlBuilder.Uri)
            $normalizedBasePath = (($builder.Path ?? '/') -replace '/+$', '')
            $normalizedRelativePath = (($RelativePath ?? '') -replace '^/+', '')
            $builder.Path = "$normalizedBasePath/$normalizedRelativePath"
            return $builder.Uri.AbsoluteUri
          }

          function Fail-Workflow([string]$Message) {
            Write-Error $Message
            exit 1
          }

          function Require-Value([string]$Name, [string]$Value) {
            if ([string]::IsNullOrWhiteSpace($Value)) {
              Fail-Workflow "Missing required configuration value '$Name'. Configure it in GitHub Actions secrets or variables before rerunning the workflow."
            }

            return $Value.Trim()
          }

          function Get-ErrorDetail([System.Management.Automation.ErrorRecord]$ErrorRecord) {
            $details = @()

            if ($null -ne $ErrorRecord.Exception) {
              $details += $ErrorRecord.Exception.Message
            }

            $response = $null
            if ($null -ne $ErrorRecord.Exception -and $null -ne $ErrorRecord.Exception.Response) {
              $response = $ErrorRecord.Exception.Response
            }

            if ($null -ne $response) {
              if ($null -ne $response.StatusCode) {
                $details += "HTTP status code: $([int]$response.StatusCode)"
              }

              if ($null -ne $response.ReasonPhrase) {
                $details += "Reason: $($response.ReasonPhrase)"
              }

              try {
                $reader = [System.IO.StreamReader]::new($response.GetResponseStream())
                try {
                  $responseBody = $reader.ReadToEnd()
                  if (-not [string]::IsNullOrWhiteSpace($responseBody)) {
                    $details += "Response body: $responseBody"
                  }
                }
                finally {
                  $reader.Dispose()
                }
              }
              catch {
              }
            }

            return ($details | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }) -join [Environment]::NewLine
          }

          function Invoke-LeapworkApi([string]$Method, [string]$Uri, [hashtable]$Headers) {
            try {
              return Invoke-RestMethod -Uri $Uri -Method $Method -Headers $Headers -ContentType "application/json" -ErrorAction Stop
            }
            catch {
              $errorDetail = Get-ErrorDetail $_
              $message = @(
                "Leapwork API request failed."
                "Method: $Method"
                "URL: $Uri"
                $errorDetail
              ) -join [Environment]::NewLine

              Fail-Workflow $message
            }
          }

          $accessKey = Require-Value "ACCESS_KEY" "${{ secrets.ACCESS_KEY }}"
          $baseUrlInput = Require-Value "BASE_URL" "${{ vars.BASE_URL }}"
          $timeDelayInput = Require-Value "TIME_DELAY" "${{ vars.TIME_DELAY }}"
          $isDoneStatusAsSuccessInput = Require-Value "ISDONESTATUSASSUCCESS" "${{ vars.ISDONESTATUSASSUCCESS }}"

          $timeDelay = 0
          if (-not [int]::TryParse($timeDelayInput, [ref]$timeDelay) -or $timeDelay -le 0) {
            Fail-Workflow "Invalid TIME_DELAY value '$timeDelayInput'. Provide a positive whole number of seconds in GitHub Actions variables."
          }

          $isDoneStatusAsSuccess = $false
          if (-not [bool]::TryParse($isDoneStatusAsSuccessInput, [ref]$isDoneStatusAsSuccess)) {
            Fail-Workflow "Invalid ISDONESTATUSASSUCCESS value '$isDoneStatusAsSuccessInput'. Use 'true' or 'false' in GitHub Actions variables."
          }

          # Define headers
          $headers = @{
            "AccessKey" = $accessKey
          }

          try {
            $controllerBaseUrl = Get-ControllerBaseUrl $baseUrlInput
          }
          catch {
            Fail-Workflow "Invalid BASE_URL value '$baseUrlInput'. Provide a valid Leapwork Controller URL or hostname."
          }

          # Fetch schedule IDs from the API
          $scheduleApiUrl = Build-ControllerApiUrl $controllerBaseUrl "api/v4/schedules"
          Write-Output "Schedules URL: $scheduleApiUrl"
          $schedulesResponse = Invoke-LeapworkApi -Method "Get" -Uri $scheduleApiUrl -Headers $headers
          $scheduleIds = $schedulesResponse | ForEach-Object { $_.Id }

          if ($null -eq $scheduleIds -or $scheduleIds.Count -eq 0) {
            Fail-Workflow "No Leapwork schedules were returned from '$scheduleApiUrl'. Verify the ACCESS_KEY permissions and the BASE_URL value."
          }

          # Initialize a hashtable to store cumulative results
          $results = @{}

          foreach ($scheduleId in $scheduleIds) {
            Write-Output "Processing Schedule ID: $scheduleId"

            # Define API URL for starting schedule
            $url = Build-ControllerApiUrl $controllerBaseUrl "api/v4/schedules/$scheduleId/runNow"
            Write-Output "RunNow URL: $url"

            try {
                # Make PUT request to start schedule
                $response = Invoke-LeapworkApi -Method "Put" -Uri $url -Headers $headers
              
                # Check if starting schedule was successful
                if (($null -ne $response)) {
                    $runId = $response.RunId
                    if ([string]::IsNullOrWhiteSpace($runId)) {
                        Fail-Workflow "Leapwork returned an empty RunId after starting schedule '$scheduleId'. URL: $url"
                    }

                    Write-Output "runId: $runId"

                    # Initialize variables
                    $isStillRunning = $true
                    $runItemsId = @()
                    $runItemsDetails = @()

                    do {
                        # Simulate waiting
                        Start-Sleep -Seconds $timeDelay

                        # Make API call to retrieve executedRunItems
                        $runItemIdsUrl = Build-ControllerApiUrl $controllerBaseUrl "api/v4/run/$runId/runItemIds"
                        Write-Output "RunItemIds URL: $runItemIdsUrl"
                        $executedRunItems = Invoke-LeapworkApi -Method "Get" -Uri $runItemIdsUrl -Headers $headers
        
                        # Filter out already processed runItems
                        $executedRunItems.RunItemIds = [string[]]$executedRunItems.RunItemIds
                        $newExecutedRunItems = $executedRunItems.RunItemIds | Where-Object { $_ -notin $runItemsId }
                        Write-Output "NewExecutedRunItems: $($newExecutedRunItems | ConvertTo-Json -Depth 10)"
                        foreach ($runItemId in $newExecutedRunItems) {
                            # Make API call to get runItem details
                            $runItemUrl = Build-ControllerApiUrl $controllerBaseUrl "api/v4/runItems/$runItemId"
                            Write-Output "RunItem URL: $runItemUrl"
                            $runItem = Invoke-LeapworkApi -Method "Get" -Uri $runItemUrl -Headers $headers

                            $status = $runItem.Status
                            $flowTitle = $runItem.FlowInfo.FlowTitle

                            Write-Output "Status: $status"
                            Write-Output "Flow Title: $flowTitle"

                            # Handle different statuses
                           switch ($runItem.Status) {
                              "NoStatus" {
                                  # Remove runItemId from the list
                                   $newExecutedRunItems = $newExecutedRunItems | Where-Object { $_ -ne $runItemId }
                              }
                              "Initializing" {
                                  # Remove runItemId from the list
                                   $newExecutedRunItems = $newExecutedRunItems | Where-Object { $_ -ne $runItemId }
                              }
                              "Connecting" {
                                  # Remove runItemId from the list
                                   $newExecutedRunItems = $newExecutedRunItems | Where-Object { $_ -ne $runItemId }
                              }
                              "Connected" {
                                  # Remove runItemId from the list
                                   $newExecutedRunItems = $newExecutedRunItems | Where-Object { $_ -ne $runItemId }
                              }
                              "Running" {
                                  # Remove runItemId from the list
                                   $newExecutedRunItems = $newExecutedRunItems | Where-Object { $_ -ne $runItemId }
                              }
                              "IsProcessing" {
                                  # Remove runItemId from the list
                                   $newExecutedRunItems = $newExecutedRunItems | Where-Object { $_ -ne $runItemId }
                              }
                              "Passed" {
                                  Write-Output "Status of runItem $($runItemId): Passed"
                                  $passedCount++
                              }
                              "Failed" {
                                  Write-Output "Status of runItem $($runItemId): Failed"
                                  $failedCount++
                              }
                              "Error" {
                                  Write-Output "Status of runItem $($runItemId): Error"
                                  $errorCount++
                              }
                              "Inconclusive" {
                                  Write-Output "Status of runItem $($runItemId): Inconclusive"
                                  $errorCount++
                              }
                              "Timeout" {
                                  Write-Output "Status of runItem $($runItemId): Timeout"
                                  $errorCount++
                              }
                              "Cancelled" {
                                  Write-Output "Status of runItem $($runItemId): Cancelled"
                                  $errorCount++
                              }
                              "Done" {
                                  Write-Output "Status of runItem $($runItemId): Done"
                                  # Determine if Done status should be considered Passed or Failed
                                  if ($isDoneStatusAsSuccess) {
                                      $passedCount++
                                  } else {
                                      $failedCount++
                                  }
                              }
                              default {
                                  Write-Output "Unhandled status: $($runItem.Status)"
                              }
                          }

                            # Add runItem details to the list
                            $runItemsDetails += [pscustomobject]@{
                                'RunItemId' = $runItemId
                                'FlowTitle' = $flowTitle
                                'Status' = $status
                            }

                            # Add runItemId to processed list
                            $runItemsId += $runItemId
                            
                        }

                        # Check if the runStatus is Finished
                        $runStatusUrl = Build-ControllerApiUrl $controllerBaseUrl "api/v4/run/$runId/status"
                        Write-Output "RunStatus URL: $runStatusUrl"
                        $runStatus = Invoke-LeapworkApi -Method "Get" -Uri $runStatusUrl -Headers $headers
          
                        if ($($runStatus.Status) -eq "Finished") {
                            # Check if all runItems have been processed
                            $allRunItemIdsUrl = Build-ControllerApiUrl $controllerBaseUrl "api/v4/run/$runId/runItemIds"
                            Write-Output "All RunItemIds URL: $allRunItemIdsUrl"
                            $allExecutedRunItems = Invoke-LeapworkApi -Method "Get" -Uri $allRunItemIdsUrl -Headers $headers
                            Write-Output "Processed Run Items Count: $($runItemsId.Count)"
                            if ($allExecutedRunItems.RunItemIds.Count -gt 0 -and $allExecutedRunItems.RunItemIds.Count -le $runItemsId.Count) {
                                $isStillRunning = $false
                            }
                        }

                        if ($isStillRunning) {
                            Write-Output "The schedule status is already '$runStatus' - wait a minute..."
                        }

                    } while ($isStillRunning)

                    # Process results for current schedule
                    $groupedRunItems = $runItemsDetails | Group-Object -Property FlowTitle
                    foreach ($group in $groupedRunItems) {
                        $flowTitle = $group.Name
                        $passedCount = ($group.Group | Where-Object { $_.Status -eq 'Passed' }).Count
                        $failedCount = ($group.Group | Where-Object { $_.Status -eq 'Failed' }).Count

                        if (-not $results.ContainsKey($flowTitle)) {
                            $results[$flowTitle] = [pscustomobject]@{
                                'FlowTitle' = $flowTitle
                                'PassedCount' = 0
                                'FailedCount' = 0
                            }
                        }

                        $results[$flowTitle].PassedCount += $passedCount
                        $results[$flowTitle].FailedCount += $failedCount
                    }

                } else {
                    Fail-Workflow "Failed to start schedule '$scheduleId' because the Leapwork API returned an empty response. URL: $url"
                }

            } catch {
                $errorDetail = Get-ErrorDetail $_
                $message = @(
                  "Failed while processing schedule '$scheduleId'."
                  "Last known schedule API URL: $url"
                  $errorDetail
                ) -join [Environment]::NewLine

                Fail-Workflow $message
            }
          }

          # Prepare CSV content
          $csvContent = "Flow Title,Passed Count,Failed Count"
          foreach ($result in $results.Values) {
              $csvContent += "`n$($result.FlowTitle),$($result.PassedCount),$($result.FailedCount)"
          }

          # Save CSV content to a file
          $csvContent | Out-File -FilePath output.csv -Encoding utf8
          Write-Output "Results saved to output.csv"

      - name: Upload output file
        uses: actions/upload-artifact@v4
        with:
          name: output-csv
          path: output.csv
